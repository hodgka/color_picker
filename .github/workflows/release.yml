name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: ColorPicker-macOS
          - os: ubuntu-latest
            artifact: ColorPicker-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev

      - name: Run tests
        run: ./scripts/test.sh

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bundle macOS app
        if: runner.os == 'macOS'
        run: ./scripts/bundle.sh --version ${{ steps.version.outputs.version }}

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp bin/ColorPicker.dmg dist/${{ matrix.artifact }}-${{ github.ref_name }}.dmg

      - name: Build Linux binary
        if: runner.os == 'Linux'
        run: ./scripts/build.sh --release

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          tar -czf dist/${{ matrix.artifact }}-${{ github.ref_name }}.tar.gz -C bin color_picker

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Color Picker ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
