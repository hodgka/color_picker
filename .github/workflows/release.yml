name: Release

on:
  push:
    tags: ["v*"]
    branches: [main]

permissions:
  contents: write

env:
  ODIN_VERSION: "dev-2025-12"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      should_release: ${{ steps.resolve.outputs.should_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            TAG="$GITHUB_REF_NAME"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f3)
            TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists, skipping"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            else
              git tag "$TAG"
              git push origin "$TAG"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            artifact: ColorPicker-macOS
          - os: ubuntu-latest
            artifact: ColorPicker-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          odin-version: ${{ env.ODIN_VERSION }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev

      - name: Run tests
        run: ./scripts/test.sh

      - name: Bundle macOS app
        if: runner.os == 'macOS'
        run: ./scripts/bundle.sh --version ${{ needs.prepare.outputs.version }}

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp bin/ColorPicker.dmg dist/${{ matrix.artifact }}-${{ needs.prepare.outputs.tag }}.dmg

      - name: Bundle Linux package
        if: runner.os == 'Linux'
        run: ./scripts/bundle.sh --version ${{ needs.prepare.outputs.version }}

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          tar -czf dist/${{ matrix.artifact }}-${{ needs.prepare.outputs.tag }}.tar.gz -C bin color_picker
          cp bin/color-picker_${{ needs.prepare.outputs.version }}_amd64.deb dist/${{ matrix.artifact }}-${{ needs.prepare.outputs.tag }}.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.prepare.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "Color Picker ${{ needs.prepare.outputs.tag }}" \
            --generate-notes \
            artifacts/*
