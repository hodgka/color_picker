changelog:
  categories:
    - title: "New Features"
      labels:
        - enhancement
        - feature
    - title: "Bug Fixes"
      labels:
        - bug
        - fix
    - title: "Performance"
      labels:
        - performance
    - title: "CI & Build"
      labels:
        - ci
        - build
        - infrastructure
    - title: "Other Changes"
      labels:
        - "*"
  exclude:
    labels:
      - skip-changelog
